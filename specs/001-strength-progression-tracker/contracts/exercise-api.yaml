openapi: 3.0.3
info:
  title: Strength Progression Tracker API
  version: 1.0.0
  description: API contract for workout session logging, exercise history, and progression comparison.
servers:
  - url: /api
paths:
  /sessions:
    post:
      summary: Create a workout session
      operationId: createSession
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSessionRequest'
      responses:
        '201':
          description: Session created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkoutSession'
  /sessions/{sessionId}/entries:
    post:
      summary: Add an exercise entry to a session
      operationId: addExerciseEntry
      parameters:
        - in: path
          name: sessionId
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateExerciseEntryRequest'
      responses:
        '201':
          description: Exercise entry created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExerciseEntry'
        '400':
          description: Validation failure
    get:
      summary: List exercise entries for a session
      operationId: listSessionEntries
      parameters:
        - in: path
          name: sessionId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Session entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ExerciseEntry'
  /entries/{entryId}:
    patch:
      summary: Update an existing exercise entry
      operationId: updateExerciseEntry
      parameters:
        - in: path
          name: entryId
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateExerciseEntryRequest'
      responses:
        '200':
          description: Updated entry
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExerciseEntry'
        '404':
          description: Entry not found
    delete:
      summary: Delete an exercise entry
      operationId: deleteExerciseEntry
      parameters:
        - in: path
          name: entryId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Deleted
        '404':
          description: Entry not found
  /exercises/{exerciseName}/history:
    get:
      summary: Retrieve exercise history for a user
      operationId: getExerciseHistory
      parameters:
        - in: path
          name: exerciseName
          required: true
          schema:
            type: string
        - in: query
          name: page
          schema:
            type: integer
            minimum: 1
            default: 1
        - in: query
          name: pageSize
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 25
      responses:
        '200':
          description: Paged history
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExerciseHistoryResponse'
  /entries/{entryId}/comparison:
    get:
      summary: Get progression comparison for an entry
      operationId: getEntryComparison
      parameters:
        - in: path
          name: entryId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Progression comparison result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProgressComparison'
        '404':
          description: Entry not found
components:
  schemas:
    CreateSessionRequest:
      type: object
      required: [startedAt]
      example:
        startedAt: "2026-02-27T18:30:00Z"
        notes: "Push day"
      properties:
        startedAt:
          type: string
          format: date-time
        notes:
          type: string
          maxLength: 1000
    WorkoutSession:
      type: object
      required: [id, startedAt, createdAt, updatedAt]
      properties:
        id:
          type: string
          format: uuid
        startedAt:
          type: string
          format: date-time
        endedAt:
          type: string
          format: date-time
          nullable: true
        notes:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    CreateExerciseEntryRequest:
      type: object
      required: [exerciseName, sets, reps, weight, weightUnit, performedAt]
      example:
        exerciseName: Bench Press
        sets: 3
        reps: 8
        weight: 82.5
        weightUnit: kg
        performedAt: "2026-02-27T18:45:00Z"
      properties:
        exerciseName:
          type: string
          minLength: 1
          maxLength: 120
        sets:
          type: integer
          minimum: 1
          maximum: 100
        reps:
          type: integer
          minimum: 1
          maximum: 500
        weight:
          type: number
          format: double
          minimum: 0
          maximum: 5000
        weightUnit:
          type: string
          enum: [kg, lb]
        performedAt:
          type: string
          format: date-time
    UpdateExerciseEntryRequest:
      type: object
      additionalProperties: false
      properties:
        sets:
          type: integer
          minimum: 1
          maximum: 100
        reps:
          type: integer
          minimum: 1
          maximum: 500
        weight:
          type: number
          format: double
          minimum: 0
          maximum: 5000
        performedAt:
          type: string
          format: date-time
    ExerciseEntry:
      type: object
      required: [id, sessionId, exerciseName, normalizedExerciseName, sets, reps, weight, weightUnit, performedAt]
      properties:
        id:
          type: string
          format: uuid
        sessionId:
          type: string
          format: uuid
        exerciseName:
          type: string
        normalizedExerciseName:
          type: string
        sets:
          type: integer
        reps:
          type: integer
        weight:
          type: number
          format: double
        weightUnit:
          type: string
          enum: [kg, lb]
        performedAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    ExerciseHistoryResponse:
      type: object
      required: [exerciseName, page, pageSize, total, entries]
      properties:
        exerciseName:
          type: string
        page:
          type: integer
        pageSize:
          type: integer
        total:
          type: integer
        entries:
          type: array
          items:
            $ref: '#/components/schemas/ExerciseEntry'
    ProgressComparison:
      type: object
      required:
        [exerciseName, currentEntryId, currentVolume, statusVsPrevious, statusVsBest]
      example:
        exerciseName: Bench Press
        currentEntryId: 11111111-1111-1111-1111-111111111111
        currentVolume: 1980
        previousEntryId: 22222222-2222-2222-2222-222222222222
        previousVolume: 1920
        bestEntryId: 33333333-3333-3333-3333-333333333333
        bestVolume: 1980
        deltaFromPrevious: 60
        deltaFromBest: 0
        statusVsPrevious: improved
        statusVsBest: unchanged
      properties:
        exerciseName:
          type: string
        currentEntryId:
          type: string
          format: uuid
        currentVolume:
          type: number
          format: double
        previousEntryId:
          type: string
          format: uuid
          nullable: true
        previousVolume:
          type: number
          format: double
          nullable: true
        bestEntryId:
          type: string
          format: uuid
          nullable: true
        bestVolume:
          type: number
          format: double
          nullable: true
        deltaFromPrevious:
          type: number
          format: double
          nullable: true
        deltaFromBest:
          type: number
          format: double
          nullable: true
        statusVsPrevious:
          type: string
          enum: [improved, unchanged, declined, no-baseline]
        statusVsBest:
          type: string
          enum: [improved, unchanged, declined, no-baseline]
