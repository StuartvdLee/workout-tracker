name: Run Tests

# Trigger this workflow on pull request creation and updates
on:
  pull_request:

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: workout_tracker_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      # Check out the repository source code
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      # Set up .NET 10 (preview) required by the project
      - name: Set up .NET
        uses: actions/setup-dotnet@v5.2.0
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      # Restore all NuGet packages for the unit test project
      - name: Restore .NET dependencies
        run: dotnet restore src/WorkoutTracker.UnitTests/WorkoutTracker.UnitTests.csproj

      # Build the unit test project (and its dependencies)
      - name: Build
        run: dotnet build src/WorkoutTracker.UnitTests/WorkoutTracker.UnitTests.csproj --no-restore --configuration Release

      # Run unit tests and report results
      - name: Run unit tests
        env:
          TEST_DB_CONNECTION: "Host=localhost;Port=5432;Database=workout_tracker_test;Username=postgres;Password=postgres"
        run: dotnet test src/WorkoutTracker.UnitTests/WorkoutTracker.UnitTests.csproj --no-build --configuration Release --logger "trx;LogFileName=test-results.trx"

      # Upload test result artifacts so they are visible in the workflow summary
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: unit-test-results
          path: src/WorkoutTracker.UnitTests/TestResults/

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      # Check out the repository source code
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      # Set up .NET 10 (preview) required by the project
      - name: Set up .NET
        uses: actions/setup-dotnet@v5.2.0
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      # Set up Node.js to compile TypeScript for WorkoutTracker.Web
      - name: Set up Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 'lts/*'
          cache: 'npm'
          cache-dependency-path: src/WorkoutTracker.Web/package-lock.json

      # Install dependencies, compile TypeScript, and run frontend tests
      - name: Build and test TypeScript
        working-directory: src/WorkoutTracker.Web
        run: |
          npm ci
          npm run build
          npm test

      # Restore all NuGet packages for the E2E test project
      - name: Restore .NET dependencies
        run: dotnet restore src/WorkoutTracker.E2ETests/WorkoutTracker.E2ETests.csproj

      # Build the E2E test project (and its dependencies)
      - name: Build
        run: dotnet build src/WorkoutTracker.E2ETests/WorkoutTracker.E2ETests.csproj --no-restore --configuration Release

      # Install Playwright browser binaries and OS-level dependencies for Chromium
      - name: Install Playwright browsers
        run: pwsh src/WorkoutTracker.E2ETests/bin/Release/net10.0/playwright.ps1 install --with-deps chromium

      # Run E2E tests and report results
      - name: Run E2E tests
        run: dotnet test src/WorkoutTracker.E2ETests/WorkoutTracker.E2ETests.csproj --no-build --configuration Release --logger "trx;LogFileName=test-results.trx"

      # Upload test result artifacts so they are visible in the workflow summary
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: e2e-test-results
          path: src/WorkoutTracker.E2ETests/TestResults/

