name: Run Tests

# Trigger this workflow on pull request creation and updates
on:
  pull_request:

jobs:
  test:
    name: Build and Test
    runs-on: ubuntu-latest
    permissions:
      contents: read

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: workout_tracker_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      # Check out the repository source code
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      # Set up .NET 10 (preview) required by the project
      - name: Set up .NET
        uses: actions/setup-dotnet@v5.2.0
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      # Set up Node.js to compile TypeScript for WorkoutTracker.Web
      - name: Set up Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 'lts/*'
          cache: 'npm'
          cache-dependency-path: src/WorkoutTracker.Web/package-lock.json

      # Install dependencies, compile TypeScript, and run frontend tests
      - name: Build and test TypeScript
        working-directory: src/WorkoutTracker.Web
        run: |
          npm ci
          npm run build
          npm test

      # Restore all NuGet packages for the solution
      - name: Restore .NET dependencies
        run: dotnet restore src/WorkoutTracker.Tests/WorkoutTracker.Tests.csproj

      # Build the test project (and its dependencies)
      - name: Build
        run: dotnet build src/WorkoutTracker.Tests/WorkoutTracker.Tests.csproj --no-restore --configuration Release

      # Install dotnet-ef and apply EF migrations to the test database
      - name: Apply EF migrations
        env:
          TEST_DB_CONNECTION: "Host=localhost;Port=5432;Database=workout_tracker_test;Username=postgres;Password=postgres"
        run: |
          export PATH="$PATH:$HOME/.dotnet/tools"
          dotnet tool install --global dotnet-ef || true
          dotnet ef database update --project src/WorkoutTracker.Infrastructure --startup-project src/WorkoutTracker.Api --configuration Release --no-build --connection "$TEST_DB_CONNECTION"

      # Install Playwright browsers required for E2E tests
      - name: Install Playwright browsers
        run: pwsh src/WorkoutTracker.Tests/bin/Release/net10.0/playwright.ps1 install chromium --with-deps

      # Run all test suites and report results
      - name: Run tests
        env:
          TEST_DB_CONNECTION: "Host=localhost;Port=5432;Database=workout_tracker_test;Username=postgres;Password=postgres"
          ASPNETCORE_ENVIRONMENT: Development
        run: dotnet test src/WorkoutTracker.Tests/WorkoutTracker.Tests.csproj --no-build --configuration Release --logger "trx;LogFileName=test-results.trx"

      # Upload test result artifacts so they are visible in the workflow summary
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: test-results
          path: src/WorkoutTracker.Tests/TestResults/

