version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "07:00"
      timezone: "Europe/Amsterdam"

  - package-ecosystem: "nuget"
    directory: "/src"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "07:00"
      timezone: "Europe/Amsterdam"
    groups:
      aspire:
        patterns:
          - "Aspire.*"
      opentelemetry:
        patterns:
          - "OpenTelemetry.*"
      efcore:
        patterns:
          - "Microsoft.EntityFrameworkCore.*"
          - "Microsoft.AspNetCore.Mvc.Testing"
      testing:
        patterns:
          - "xunit*"
          - "coverlet.*"
          - "Microsoft.NET.Test.Sdk"

  - package-ecosystem: "npm"
    directory: "/src/WorkoutTracker.Web"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "07:00"
      timezone: "Europe/Amsterdam"
    groups:
      typescript:
        patterns:
          - "typescript"
